version: "3.9"

services:
  # ─── FastAPI App ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindsync_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mindsync:mindsync123@postgres:5432/mindsync_db
      SYNC_DATABASE_URL: postgresql://mindsync:mindsync123@postgres:5432/mindsync_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mindsync_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mindsync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindsync_db
      POSTGRES_USER: mindsync
      POSTGRES_PASSWORD: mindsync123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindsync_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsync -d mindsync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mindsync_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mindsync_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Celery Worker ────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindsync_celery_worker
    restart: unless-stopped
    command: celery -A app.config.celery_config.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://mindsync:mindsync123@postgres:5432/mindsync_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - mindsync_net

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindsync_celery_beat
    restart: unless-stopped
    command: celery -A app.config.celery_config.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    networks:
      - mindsync_net

  # ─── Flower (Celery Monitor) ──────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindsync_flower
    restart: unless-stopped
    command: celery -A app.config.celery_config.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - mindsync_net

  # ─── MinIO (Object Storage) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mindsync_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mindsync_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Nginx (Reverse Proxy) ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mindsync_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - mindsync_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  mindsync_net:
    driver: bridge
